name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Persist the Transformers.js download cache and warm it once (below) so
      # the transcription/embedding tests run offline instead of re-fetching
      # Whisper & CLIP from huggingface.co every run — a live HF outage used to
      # fail unrelated PRs. See src/model-env.mjs and scripts/warm-models.mjs.
      # The cache lives under runner.temp (OUTSIDE the checkout) so `bun run
      # check`/typecheck/build never scan the ~885MB of model files.
      - name: Cache Transformers.js models
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/hf-model-cache
          key: hf-models-v1-whisper-base-en-clip-vit-b32

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Only network step that touches huggingface.co. On a cache hit this is a
      # fast offline no-op; on a miss it downloads with retries. Kept online
      # (no TRANSFORMERS_OFFLINE) so it can populate a cold cache.
      - name: Warm model cache
        run: node scripts/warm-models.mjs
        env:
          OPENKLIP_MODEL_CACHE: ${{ runner.temp }}/hf-model-cache

      - name: Lint and format check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck --incremental false --pretty false

      - name: Unit tests
        run: bun run test
        env:
          OPENKLIP_MODEL_CACHE: ${{ runner.temp }}/hf-model-cache
          TRANSFORMERS_OFFLINE: "1"

      - name: Multicam ffmpeg integration tests
        run: OPENKLIP_INTEGRATION=1 bun test --isolate tests/cam-mix.test.ts tests/cam-remix.test.ts -t integration
        env:
          OPENKLIP_MODEL_CACHE: ${{ runner.temp }}/hf-model-cache
          TRANSFORMERS_OFFLINE: "1"

      - name: Agent loop smoke audit
        run: bun run agent-smoke-audit
        env:
          OPENKLIP_MODEL_CACHE: ${{ runner.temp }}/hf-model-cache
          TRANSFORMERS_OFFLINE: "1"

      - name: Build
        run: bun run build

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Resolve a REAL Chrome binary path and hard-fail if none is found. The
      # tests' chromeAvailable() gate is existsSync(OPENKLIP_CHROME_PATH), so a
      # bare "chrome" (not a path) silently SKIPPED every browser test and left
      # this job hollow-green. Resolve via the setup-chrome output first, then
      # PATH; `test -x` guarantees the job fails loudly rather than skipping.
      - name: Browser integration tests
        run: |
          CHROME="${{ steps.setup-chrome.outputs.chrome-path }}"
          if [ -z "$CHROME" ] || [ ! -x "$CHROME" ]; then
            CHROME="$(command -v chrome || command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          fi
          echo "Resolved Chrome: $CHROME"
          if [ -z "$CHROME" ] || [ ! -x "$CHROME" ]; then
            echo "::error::No Chrome binary found; browser integration tests would skip." && exit 1
          fi
          export OPENKLIP_CHROME_PATH="$CHROME"
          OPENKLIP_INTEGRATION=1 bun test tests/transcript-diff-browser.test.ts tests/json-graphic-browser.test.ts tests/golden-path-browser.test.ts
