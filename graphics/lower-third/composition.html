<div data-fps="30" data-graphic-root data-height="1080" data-width="1920">
  <style>
  .lt {
    position: absolute;
    bottom: 120px;
    left: 120px;
    max-width: 1100px;
    font-family: Arial, Helvetica, sans-serif;
    color: #fff;
  }
  .lt .bar {
    display: block;
    width: 64px;
    height: 4px;
    margin-bottom: 10px;
    background: var(--accent, oklch(0.809 0.1 284.59));
    border-radius: 2px;
  }
  .lt .box {
    display: inline-block;
    padding: 14px 22px;
    background: rgba(0, 0, 0, 0.63);
    border-radius: 8px;
    backdrop-filter: blur(2px);
  }
  .lt .ttl {
    font-size: 54px;
    font-weight: 700;
    line-height: 1.05;
  }
  .lt .sub {
    margin-top: 6px;
    font-size: 30px;
    font-weight: 400;
    opacity: 0.92;
  }
  </style>
  <div
    class="lt"
    data-anim="fade,slideUp"
    data-ease="easeOut"
    data-in-dur="5"
    data-in-frame="0"
    data-out-dur="5"
    data-out-frame="-12"
    data-slide="44"
  >
    <span class="bar"></span>
    <div class="box">
      <div class="ttl" data-bind="title">Name</div>
      <div class="sub" data-bind="subtitle"></div>
    </div>
  </div>
</div>
