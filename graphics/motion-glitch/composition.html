<div data-fps="30" data-graphic-root data-height="1080" data-width="1920">
  <style>
  .gl {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8%;
    text-align: center;
  }
  .gl h1 {
    margin: 0;
    font-family: "JetBrains Mono", "Consolas", "SF Mono", monospace;
    font-size: 112px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    text-shadow:
      0 2px 24px rgba(0, 0, 0, 0.5),
      2px 0 var(--accent, oklch(0.809 0.1 284.59));
  }
  </style>
  <div class="gl">
    <h1
      data-anim="glitch"
      data-bind="text"
      data-glitch-amp="8"
      data-in-dur="6"
      data-in-frame="0"
      data-out-dur="6"
      data-out-frame="-8"
      data-split="char"
      data-timing-bind
    >
      SYSTEM ONLINE
    </h1>
  </div>
</div>
