<div data-fps="30" data-graphic-root data-height="1080" data-width="1920">
  <style>
  .hp {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8%;
    text-align: center;
  }
  .hp .row {
    display: inline-flex;
    gap: 28px;
    align-items: center;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    font-size: 120px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 28px rgba(0, 0, 0, 0.5);
  }
  .hp .highlight {
    display: inline-block;
    padding: 4px 32px;
    color: #10121a;
    text-shadow: none;
    background: var(--accent, oklch(0.809 0.1 284.59));
    border-radius: 16px;
  }
  </style>
  <div class="hp">
    <div class="row">
      <span
        data-anim="fade,slideUp"
        data-bind="text"
        data-ease="easeOut"
        data-in-dur="8"
        data-in-frame="0"
        data-out-dur="6"
        data-out-frame="-8"
        data-slide="40"
        data-timing-bind
        >Time to</span
      ><span
        class="highlight"
        data-anim="scaleIn,fade"
        data-bind="highlight"
        data-ease="spring"
        data-in-dur="10"
        data-in-frame="8"
        data-out-dur="6"
        data-out-frame="-8"
        >ship</span
      >
    </div>
  </div>
</div>
