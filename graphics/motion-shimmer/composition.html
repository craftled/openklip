<div data-fps="30" data-graphic-root data-height="1080" data-width="1920">
  <style>
  .sh {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8%;
    text-align: center;
  }
  .sh h1 {
    margin: 0;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    font-size: 128px;
    font-weight: 800;
    /* Base color acts as the resting state; the runtime sweeps a
         transparent-to-accent-to-transparent gradient band across the text by
         animating background-position over --sweep-progress. */
    color: #fff;
    text-shadow: 0 2px 28px rgba(0, 0, 0, 0.5);
    background-image: linear-gradient(
      100deg,
      transparent 40%,
      var(--accent, oklch(0.809 0.1 284.59)) 50%,
      transparent 60%
    );
    background-repeat: no-repeat;
    -webkit-background-clip: text;
    background-clip: text;
    background-size: 200% 100%;
  }
  </style>
  <div class="sh">
    <h1
      data-anim="shimmer"
      data-bind="text"
      data-in-dur="8"
      data-in-frame="0"
      data-loop-dur="0"
      data-out-dur="6"
      data-out-frame="-8"
      data-sweep-dur="30"
    >
      Premium
    </h1>
  </div>
</div>
