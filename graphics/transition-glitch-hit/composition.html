<div data-fps="30" data-graphic-root data-height="1080" data-width="1920">
  <style>
  .hit {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.55);
  }
  .hit h1 {
    margin: 0;
    font-family: "JetBrains Mono", "Consolas", "SF Mono", monospace;
    font-size: 120px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.08em;
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
  }
  </style>
  <div class="hit">
    <h1
      data-anim="glitch fade"
      data-bind="text"
      data-glitch-amp="12"
      data-in-dur="6"
      data-in-frame="0"
      data-out-dur="6"
      data-out-frame="-6"
      data-split="char"
      data-timing-bind
    >
      CUT
    </h1>
  </div>
</div>
