<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenKlip</title>
    <!--
      This splash mirrors the in-app loader (web/components/openklip-loader.tsx
      + shimmering-text.tsx): logo mark + "OpenKlip" wordmark whose characters
      shimmer muted -> foreground with a per-character stagger. Reimplemented
      in pure CSS because this page must render instantly with zero JS/React —
      it is what the user sees before the engine has even started.

      Color tokens are copied from app/globals.css (:root / .dark), keyed off
      prefers-color-scheme here since no theme JS has loaded yet.

      Contract with src-tauri/src/main.rs (show_splash_error): it removes
      `.spinner` if present, rewrites `.status`, appends a <pre> to `.wrap`,
      and adds the `engine-error` class on <body> to freeze the shimmer —
      keep those selectors stable.
    -->
    <style>
      :root {
        color-scheme: light dark;
        --background: oklch(1 0 0);
        --foreground: oklch(0.145 0 0);
        --muted-foreground: oklch(0.556 0 0);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background: oklch(0.145 0 0);
          --foreground: oklch(0.985 0 0);
          --muted-foreground: oklch(0.708 0 0);
        }
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font:
          14px/1.5 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--background);
        color: var(--foreground);
        display: grid;
        place-items: center;
      }
      .wrap {
        text-align: center;
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        user-select: none;
      }
      .mark {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
        color: var(--foreground);
      }
      .wordmark {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      /* One shimmer cycle matches the app loader: 1.2s color sweep plus a
         text.length * 0.05s (= 0.4s) rest, staggered 1.2s/8 per character. */
      .wordmark span {
        display: inline-block;
        color: var(--muted-foreground);
        animation: shimmer 1.6s ease-in-out infinite;
      }
      .wordmark span:nth-child(1) { animation-delay: 0s; }
      .wordmark span:nth-child(2) { animation-delay: 0.15s; }
      .wordmark span:nth-child(3) { animation-delay: 0.3s; }
      .wordmark span:nth-child(4) { animation-delay: 0.45s; }
      .wordmark span:nth-child(5) { animation-delay: 0.6s; }
      .wordmark span:nth-child(6) { animation-delay: 0.75s; }
      .wordmark span:nth-child(7) { animation-delay: 0.9s; }
      .wordmark span:nth-child(8) { animation-delay: 1.05s; }
      @keyframes shimmer {
        0% { color: var(--muted-foreground); }
        37.5% { color: var(--foreground); }
        75%, 100% { color: var(--muted-foreground); }
      }
      body.engine-error .wordmark span {
        animation: none;
      }
      .status {
        margin-top: 12px;
        color: var(--muted-foreground);
        font-size: 13px;
      }
      body.engine-error .status {
        color: #d93025;
      }
      @media (prefers-color-scheme: dark) {
        body.engine-error .status {
          color: #ff8a80;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <svg
          aria-hidden="true"
          class="mark"
          fill="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M0 0h24v24H0z" fill="none" stroke="none" />

          />
        </svg>
        <div class="wordmark" role="status" aria-label="OpenKlip is starting">
          <span>O</span><span>p</span><span>e</span><span>n</span><span>K</span><span>l</span><span>i</span><span>p</span>
        </div>
      </div>
      <div class="status">Starting the local engine…</div>
    </div>
  </body>
</html>
