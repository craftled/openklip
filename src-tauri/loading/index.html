<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenKlip</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0; height: 100%;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0b0c; color: #e6e6e6;
        display: grid; place-items: center;
      }
      .wrap { text-align: center; }
      .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
      .status { margin-top: 10px; color: #9aa0a6; font-size: 13px; }
      .spinner {
        margin: 20px auto 0; width: 22px; height: 22px;
        border: 2px solid rgba(255,255,255,0.15); border-top-color: #e6e6e6;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">OpenKlip</div>
      <div class="spinner"></div>
      <div class="status">Starting the local engine…</div>
    </div>
  </body>
</html>
